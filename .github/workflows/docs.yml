name: Deploy SRS Docs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: |
          pip install "mkdocs<2.0" "mkdocs-material<9.0"

      # ✅ 只构建，不部署
      - name: Build site
        run: |
          mkdocs build --strict

  deploy:
    if: github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: |
          pip install "mkdocs<2.0" "mkdocs-material<9.0"

      - name: Deploy to GitHub Pages
        run: |
          mkdocs gh-deploy --force --verbose